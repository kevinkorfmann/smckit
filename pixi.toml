[project]
name = "smckit"
platforms = ["osx-arm64", "osx-64", "linux-64"]
channels = ["conda-forge"]

[dependencies]
python = "3.12.*"
uv = "*"
git = "*"

[feature.upstream.dependencies]
r-base = "*"
openjdk = "21.*"
ldc = "*"
cmake = "*"
make = "*"

[environments]
default = []
upstream = ["upstream"]

[tasks]
uv-sync = "uv sync --extra dev --extra docs"
test = "uv run pytest -q"
test-fast = "uv run pytest -q tests/unit tests/integration/test_packaged_quickstarts.py"
docs = "uv run sphinx-build -b html docs docs/_build/html"
build = "uv build --offline --no-build-isolation"
